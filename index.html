<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор Інвойсів / Invoice Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .row {
            display: flex;
            gap: 15px;
        }
        .row .form-group {
            flex: 1;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
            background: #eef2f7;
            padding: 12px;
            border-radius: 4px;
            border-left: 4px solid #3498db;
        }
        .checkbox-group input {
            width: auto;
            cursor: pointer;
        }
        .checkbox-group label {
            margin-bottom: 0;
            font-weight: normal;
            font-size: 0.95em;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        #invoice-modal {
            display: none;
            margin-top: 30px;
            background: white;
            padding: 30px;
            border: 1px solid #ddd;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-radius: 4px;
        }
        .print-btn {
            background-color: #2ecc71;
            margin-bottom: 20px;
        }
        .print-btn:hover {
            background-color: #27ae60;
        }
        @media print {
            body * {
                visibility: hidden;
            }
            #invoice-content, #invoice-content * {
                visibility: visible;
            }
            #invoice-content {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                border: none;
                padding: 0;
                box-shadow: none;
            }
            .no-print {
                display: none !important;
            }
        }
    </style>
</head>
<body>

<div class="container no-print">
    <h2>Генератор Інвойсів / Invoice Generator</h2>
    
    <div class="row">
        <div class="form-group">
            <label for="lang">Мова інвойсу / Invoice Language</label>
            <select id="lang">
                <option value="ua">Українська (Двомовний ЗЕД)</option>
                <option value="en">English Only</option>
            </select>
        </div>
        <div class="form-group">
            <label for="invoiceNum">Номер інвойсу / Invoice №</label>
            <input type="text" id="invoiceNum" placeholder="напр., 2024-01">
        </div>
    </div>

    <div class="row">
        <div class="form-group">
            <label for="date">Дата / Date</label>
            <input type="date" id="date">
        </div>
        <div class="form-group">
            <label for="amount">Сума ($) / Amount ($)</label>
            <input type="number" step="0.01" id="amount" placeholder="0.00">
        </div>
    </div>

    <div class="form-group">
        <label for="client">Клієнт (Назва та Адреса) / Client (Name & Address)</label>
        <input type="text" id="client" placeholder="Google LLC, 1600 Amphitheatre Pkwy, Mountain View, CA 94043, USA">
    </div>

    <div class="checkbox-group">
        <input type="checkbox" id="acceptTerms" onchange="toggleButton()">
        <label for="acceptTerms">
            Я підтверджую, що послуги надавались дистанційно, електронною поштою, не містять матеріальної складової і не потребують підписання акту приймання-передачі.
        </label>
    </div>

    <button id="generateBtn" disabled onclick="generateInvoice()">Згенерувати інвойс / Generate Invoice</button>
</div>

<!-- Блок для відображення згенерованого інвойсу -->
<div class="invoice-modal" id="invoice-modal">
    <button class="print-btn no-print" onclick="window.print()">Друк / Зберегти в PDF</button>
    <div id="invoice-content"></div>
</div>

<script>
    // Встановлюємо сьогоднішню дату за замовчуванням
    document.getElementById('date').value = new Date().toISOString().split('T')[0];

    // Активація кнопки після згоди з умовою публічної оферти
    function toggleButton() {
        const checkbox = document.getElementById('acceptTerms');
        const btn = document.getElementById('generateBtn');
        btn.disabled = !checkbox.checked;
    }

    // Основна функція генерації контенту рахунку
    function generateInvoice() {
        const lang = document.getElementById('lang').value;
        const invoiceNum = document.getElementById('invoiceNum').value || '_______';
        const dateInput = document.getElementById('date').value;
        const amount = parseFloat(document.getElementById('amount').value || 0).toFixed(2);
        const client = document.getElementById('client').value || '__________________________________________________';

        // Форматування дати
        let dateStr = '_______';
        if (dateInput) {
            const d = new Date(dateInput);
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const year = d.getFullYear();
            dateStr = `${day}.${month}.${year}`;
        }

        let html = '';

        if (lang === 'ua') {
            // Двомовний інвойс (Українська / Англійська)
            html = `
                <div style="display:flex; justify-content:space-between; border-bottom:2px solid #333; padding-bottom:10px; margin-bottom:20px;">
                    <div>
                        <h1 style="margin:0; font-size:24px;">ІНВОЙС / INVOICE № ${invoiceNum}</h1>
                        <p style="margin:5px 0 0 0;">Дата / Date: <strong>${dateStr}</strong></p>
                    </div>
                    <div style="text-align:right; font-size:0.9em;">
                        <strong>Виконавець / Developer:</strong><br>
                        ФОП [Ваше Ім'я / Your Name]<br>
                        Адреса / Address: [Ваша адреса / Your Address]<br>
                        ІПН / Tax ID: [Ваш ІПН / Your Tax ID]<br>
                        Email: [Ваш Email]
                    </div>
                </div>

                <div style="margin-bottom:20px; background:#f9f9f9; padding:15px; border-radius:4px;">
                    <strong>Замовник / Customer:</strong><br>
                    ${client}
                </div>

                <table style="width:100%; border-collapse:collapse; margin-bottom:30px;">
                    <thead>
                        <tr style="background:#2c3e50; color:white;">
                            <th style="padding:10px; border:1px solid #ddd; text-align:left;">Опис послуг / Description of Services</th>
                            <th style="padding:10px; border:1px solid #ddd; text-align:right; width:150px;">Сума / Amount</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td style="padding:10px; border:1px solid #ddd;">
                                Послуги з розробки програмного забезпечення та консультування в сфері IT за період згідно з домовленістю.<br>
                                <span style="color:#666; font-style:italic;">Software development and IT consulting services for the period according to agreement.</span>
                            </td>
                            <td style="padding:10px; border:1px solid #ddd; text-align:right; font-weight:bold; font-size:1.1em;">$ ${amount}</td>
                        </tr>
                        <tr style="background:#f1f1f1; font-weight:bold;">
                            <td style="padding:10px; border:1px solid #ddd; text-align:right;">Всього до сплати / TOTAL DUE:</td>
                            <td style="padding:10px; border:1px solid #ddd; text-align:right; font-size:1.2em; color:#2c3e50;">$ ${amount}</td>
                        </tr>
                    </tbody>
                </table>

                <div style="margin-bottom:30px; font-size:0.95em; line-height:1.5;">
                    <h3 style="margin-top:0; border-bottom:1px solid #ddd; padding-bottom:5px;">Банківські реквізити / Bank Details:</h3>
                    <strong>Bank Name:</strong> [Назва банку, напр., КІТ Банк / JSC CB PRIVATBANK]<br>
                    <strong>Bank Address:</strong> [Адреса банку / Bank Address]<br>
                    <strong>SWIFT/BIC:</strong> [Ваш SWIFT код]<br>
                    <strong>Account (IBAN):</strong> [Ваш IBAN рахунок]<br>
                    <strong>Beneficiary:</strong> FOP [Ваше Ім'я латиницею / Your Name]<br>
                    <strong>Beneficiary Address:</strong> [Ваша адреса латиницею / Your Address]
                </div>

                <div style="font-size:0.85em; color:#555; border-top:1px dashed #ccc; padding-top:15px; line-height:1.4;">
                    <p><strong>Публічна оферта (Застереження):</strong> Оплата цього інвойсу за реквізитами є свідченням надання послуг в повному обсязі, належної якості, відповідно до усної чи письмової домовленості сторін, та є підтвердженням виконання робіт без необхідності підписання двосторонніх актів приймання-передачі.</p>
                    <p style="font-style:italic;"><strong>Public Offer (Disclaimer):</strong> Payment of this invoice according to bank details constitutes confirmation of services provided in full scope, proper quality, under verbal or written agreement of the parties, and serves as acceptance of work done without necessity of signing bilateral acceptance acts.</p>
                </div>

                <div style="font-size:0.9em; color:#333; background:#f9f9f9; padding:12px; border-left:4px solid #3498db; margin: 15px 0;">
                    <strong>ПРИЗНАЧЕННЯ ПЛАТЕЖУ (Payment Reference):</strong><br>
                    <code style="display:block; margin-top:5px; background:#fff; padding:5px; border:1px solid #ddd;">Payment for IT services under Invoice № ${invoiceNum} dated ${dateStr}. No VAT.</code>
                </div>
            `;
        } else {
            // Лише англійська версія (English Only)
            html = `
                <div style="display:flex; justify-content:space-between; border-bottom:2px solid #333; padding-bottom:10px; margin-bottom:20px;">
                    <div>
                        <h1 style="margin:0; font-size:24px;">INVOICE № ${invoiceNum}</h1>
                        <p style="margin:5px 0 0 0;">Date: <strong>${dateStr}</strong></p>
                    </div>
                    <div style="text-align:right; font-size:0.9em;">
                        <strong>Contractor:</strong><br>
                        IE [Your Name]<br>
                        Address: [Your Address]<br>
                        Tax ID: [Your Tax ID]<br>
                        Email: [Your Email]
                    </div>
                </div>

                <div style="margin-bottom:20px; background:#f9f9f9; padding:15px; border-radius:4px;">
                    <strong>Customer:</strong><br>
                    ${client}
                </div>

                <table style="width:100%; border-collapse:collapse; margin-bottom:30px;">
                    <thead>
                        <tr style="background:#2c3e50; color:white;">
                            <th style="padding:10px; border:1px solid #ddd; text-align:left;">Description of Services</th>
                            <th style="padding:10px; border:1px solid #ddd; text-align:right; width:150px;">Amount</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td style="padding:10px; border:1px solid #ddd;">
                                Software development and IT consulting services for the period according to agreement. Provided remotely via electronic channels.
                            </td>
                            <td style="padding:10px; border:1px solid #ddd; text-align:right; font-weight:bold; font-size:1.1em;">$ ${amount}</td>
                        </tr>
                        <tr style="background:#f1f1f1; font-weight:bold;">
                            <td style="padding:10px; border:1px solid #ddd; text-align:right;">TOTAL DUE:</td>
                            <td style="padding:10px; border:1px solid #ddd; text-align:right; font-size:1.2em; color:#2c3e50;">$ ${amount}</td>
                        </tr>
                    </tbody>
                </table>

                <div style="margin-bottom:30px; font-size:0.95em; line-height:1.5;">
                    <h3 style="margin-top:0; border-bottom:1px solid #ddd; padding-bottom:5px;">Bank Details:</h3>
                    <strong>Bank Name:</strong> [Bank Name, e.g., JSC CB PRIVATBANK]<br>
                    <strong>Bank Address:</strong> [Bank Address]<br>
                    <strong>SWIFT/BIC:</strong> [Your SWIFT]<br>
                    <strong>Account (IBAN):</strong> [Your IBAN]<br>
                    <strong>Beneficiary:</strong> IE [Your Name]<br>
                    <strong>Beneficiary Address:</strong> [Your Address]
                </div>

                <div style="font-size:0.85em; color:#555; border-top:1px dashed #ccc; padding-top:15px; line-height:1.4;">
                    <p style="font-style:italic;"><strong>Public Offer (Disclaimer):</strong> Payment of this invoice according to bank details constitutes confirmation of services provided in full scope, proper quality, under verbal or written agreement of the parties, and serves as acceptance of work done without necessity of signing bilateral acceptance acts.</p>
                </div>

                <div style="font-size:0.9em; color:#333; background:#f9f9f9; padding:12px; border-left:4px solid #3498db; margin: 15px 0;">
                    <strong>REMITTANCE INFORMATION (Payment Reference):</strong><br>
                    <code style="display:block; margin-top:5px; background:#fff; padding:5px; border:1px solid #ddd;">Payment for IT services under Invoice № ${invoiceNum} dated ${dateStr}. No VAT.</code>
                </div>
            `;
        }

        // Вставляємо відрендерений HTML у контейнер для перегляду рахунку
        document.getElementById('invoice-content').innerHTML = html;
        // Відображаємо сам модальний блок рахунку
        document.getElementById('invoice-modal').style.display = 'block';
        
        // Робимо плавну прокрутку вниз екрана, щоб користувач побачив згенерований рахунок
        document.getElementById('invoice-modal').scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
